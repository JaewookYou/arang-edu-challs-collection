{% extends "base.html" %}{% block body %}
<form class="auth" method="post" action="/login">
  <h2 style="margin:0 0 16px">로그인</h2>
  <input name="userid" placeholder="아이디">
  <input name="userpw" type="password" placeholder="비밀번호">
  <div class="msg">{{ msg }}</div>
  <button class="btn" style="width:100%" type="submit">로그인</button>
  <p style="text-align:center;font-size:13px;color:#8A99A8;margin-top:14px"><a href="/register" style="color:#2563EB">회원가입</a></p>
</form>
{% endblock %}
