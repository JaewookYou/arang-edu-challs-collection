{% extends "base.html" %}{% block body %}
<h2 style="margin:0 0 6px">관리자에게 신고</h2>
<p style="color:#8A99A8;font-size:13px;margin:0 0 14px">입력한 URL을 관리자(admin)가 로그인된 상태로 방문합니다.</p>
<form method="post" action="/report">
  <input name="url" placeholder="http://{{ title }} 내부 URL (예: http://xss-1:9101/board/1)">
  <button class="btn" type="submit" style="margin-top:8px">신고</button>
</form>
{% endblock %}
