  - { id: prototype-pollution, title: "Prototype Pollution", category: server,  difficulty: 3, port: 9503, url: "http://localhost:9503/", needs_bot: true,  flag_env: FLAG_PROTO, status: ready }
  # ── jsp ──
  - { id: jsp-sqli,         title: "JSP — SQL Injection",   category: jsp,       difficulty: 2, port: 9601, url: "http://localhost:9601/", needs_bot: false, flag_env: FLAG_JSP_SQLI, status: ready }
  - { id: jsp-upload,       title: "JSP — File Upload",     category: jsp,       difficulty: 2, port: 9602, url: "http://localhost:9602/", needs_bot: false, flag_env: FLAG_JSP_UPLOAD, status: ready }
