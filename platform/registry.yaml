  - { id: fsi-chat-xss,  title: "캡스톤 — FSI 채팅(XSS→admin 글 탈취)",       category: capstone, difficulty: 4, port: 9090, url: "http://localhost:9090/", needs_bot: true,  flag_env: FLAG_FSI_XSS,  status: ready, own_compose: true, source: "github.com/JaewookYou/2022_fsi_edu_challs (외부 :9090 · XSS→SSRF→MySQL)" }
  - { id: fsi-chat-sqli, title: "캡스톤 — FSI 채팅(SQLi 파일유출 LOAD_FILE)",  category: capstone, difficulty: 3, port: 9090, url: "http://localhost:9090/", needs_bot: false, flag_env: FLAG_FSI_SQLI, status: ready, own_compose: true, source: "github.com/JaewookYou/2022_fsi_edu_challs (외부 :9090 · /download SQLi)" }
