<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}모의해킹 실습 플랫폼{% endblock %}</title>
<style>
  :root{ --ink:#0E2A47; --red:#D92D20; --body:#44566A; --mute:#8A99A8; --line:#E4E9EF; --card:#F7F9FC; --green:#1E8E5A; }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Malgun Gothic","Apple SD Gothic Neo",sans-serif;color:var(--ink);background:#fff}
  a{color:inherit;text-decoration:none}
  header{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--line)}
  header .brand{font-weight:700;font-size:18px}
  header .brand small{color:var(--red);font-weight:700;letter-spacing:1px;font-size:12px;display:block}
  header nav a{margin-left:18px;color:var(--body);font-size:14px}
  header nav a.active{color:var(--ink);font-weight:700}
  .wrap{max-width:1040px;margin:0 auto;padding:28px}
  .btn{display:inline-block;background:var(--ink);color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:14px;cursor:pointer}
  .btn.red{background:var(--red)}
  .auth{max-width:380px;margin:8vh auto;padding:32px;border:1px solid var(--line);border-radius:14px}
  .auth h1{font-size:22px;margin:0 0 4px} .auth p.sub{color:var(--mute);margin:0 0 22px;font-size:13px}
  .auth input{width:100%;padding:11px 13px;margin:6px 0;border:1px solid var(--line);border-radius:8px;font-size:14px}
  .auth .btn{width:100%;margin-top:10px}
  .msg{color:var(--red);font-size:13px;min-height:18px}
  .cat{margin:26px 0 10px;font-size:13px;font-weight:700;color:var(--mute);letter-spacing:.5px;text-transform:uppercase}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
  .chal{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border:1px solid var(--line);border-radius:12px;background:#fff}
  .chal.solved{background:var(--card)}
  .chal.planned{opacity:.5}
  .chal .t{font-weight:700;font-size:15px}
  .chal .d{font-size:12px;color:var(--mute);margin-top:3px}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:7px;vertical-align:1px}
  .pill{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:700}
  .pill.go{background:#ECF1FE;color:#2563EB}.pill.ok{background:#EAF6EF;color:var(--green)}.pill.soon{background:#F1F4F8;color:var(--mute)}
  .submit{display:flex;gap:10px;margin:6px 0 4px}
  .submit input{flex:1;padding:11px 13px;border:1px solid var(--line);border-radius:8px;font-size:14px}
  table{width:100%;border-collapse:collapse} td,th{padding:11px 12px;text-align:left;border-bottom:1px solid var(--line);font-size:14px} th{color:var(--mute);font-size:12px}
</style>
</head>
<body>
<header>
  <a class="brand" href="/"><small>FINANCIAL SECURITY · WEB PENTEST LAB</small>모의해킹 실습 플랫폼</a>
  <nav>
    {% if uid %}<a href="/">문제</a><a href="/ranking">랭킹</a><a href="/logout">{{ uid }} · 로그아웃</a>
    {% else %}<a href="/login">로그인</a>{% endif %}
  </nav>
</header>
<div class="wrap">{% block body %}{% endblock %}</div>
</body>
</html>
